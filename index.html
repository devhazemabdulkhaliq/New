<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أخوات حازم - الشات الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background-color: #030712; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #7e22ce; border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans flex flex-col h-full w-full">

    <header class="h-[60px] bg-purple-800 shadow-2xl flex justify-between items-center px-4 z-20 border-b border-purple-500">
        <h1 class="text-lg font-bold">أخوات حازم 🚀</h1>
        <div id="user-display" class="text-xs bg-purple-900 px-3 py-1 rounded-full border border-purple-400 font-bold text-white">
            جاري التحميل...
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-900 flex flex-col pb-6">
        </main>

    <footer class="p-3 bg-gray-800 border-t border-gray-700 flex gap-2 items-center flex-shrink-0">
        <input type="text" id="message-input" autocomplete="off"
               class="flex-1 bg-gray-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-purple-500 text-white" 
               placeholder="اكتب رسالتك...">
        <button id="send-btn" onclick="sendMessage()" class="bg-purple-600 hover:bg-purple-700 p-3 rounded-xl font-bold px-6 shadow-lg active:scale-95">
            إرسال
        </button>
    </footer>

    <script>
        const API_URL = 'https://cypgyuqstiorykyrywky.supabase.co/rest/v1/messages';
        const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cGd5dXFzdGlvcnlreXJ5d2t5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTU5OTcsImV4cCI6MjA4OTkzMTk5N30.YOBVCDIp7R3Nh5J6_kevifbnEWxtolSnz_N3auAJvQA';

        let username = localStorage.getItem('chat_username');
        
        // التأكد من طلب الاسم فوراً
        window.onload = () => {
            if (!username) {
                username = prompt("أدخل اسمك المستعار يا بطل:") || "أخ_" + Math.floor(Math.random() * 999);
                localStorage.setItem('chat_username', username);
            }
            document.getElementById('user-display').innerText = "أنت: " + username;
            loadMessages();
            // تحديث تلقائي كل 3 ثواني كبديل للريل تايم لو معلق
            setInterval(loadMessages, 3000);
        };

        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');

        function appendMessage(msg) {
            const isMyMessage = msg.username === username;
            const msgId = `msg-${msg.id}`;
            if (document.getElementById(msgId)) return; // منع التكرار

            const msgDiv = document.createElement('div');
            msgDiv.id = msgId;
            msgDiv.className = `flex ${isMyMessage ? 'justify-end' : 'justify-start'}`;
            msgDiv.innerHTML = `
                <div class="max-w-[85%] p-3 rounded-2xl ${isMyMessage ? 'bg-purple-700 rounded-br-none' : 'bg-gray-800 rounded-bl-none border border-gray-700'}">
                    <span class="font-bold text-[10px] block mb-1 text-purple-300" onclick="mentionUser('${msg.username}')">${msg.username}</span>
                    <p class="text-sm break-words text-white">${msg.content}</p>
                </div>
            `;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function mentionUser(user) {
            if (user === username) return;
            messageInput.value = `${user}, ` + messageInput.value;
            messageInput.focus();
        }

        async function loadMessages() {
            try {
                const res = await fetch(`${API_URL}?select=*&order=inserted_at.asc`, {
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
                });
                const data = await res.json();
                if (data && Array.isArray(data)) {
                    data.forEach(msg => appendMessage(msg));
                }
            } catch (err) { console.error("Error loading:", err); }
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;
            
            messageInput.value = '';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ username, content })
                });

                if (res.ok) {
                    loadMessages(); // تحديث فوري بعد الإرسال
                } else {
                    const errorData = await res.json();
                    alert("خطأ من السيرفر: " + errorData.message);
                }
            } catch (err) {
                alert("فشل الاتصال بالإنترنت أو السيرفر");
            }
        }

        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
