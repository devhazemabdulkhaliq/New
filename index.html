<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Developer Chat - Bultx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ستايل لتهيئة الطول الكامل */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        .message-username:hover { text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans flex flex-col h-screen w-full">

    <header class="p-4 bg-purple-800 shadow-lg flex justify-between items-center z-10">
        <h1 class="text-xl font-bold text-white">Bultx Room 🚀</h1>
        <div id="user-status" class="text-sm text-purple-200"></div>
    </header>

    <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-900">
        </div>

    <footer class="p-4 bg-gray-800 border-t border-gray-700 flex gap-2 items-center z-10">
        <input type="text" id="message-input" 
               class="flex-1 bg-gray-700 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500 text-white" 
               placeholder="اكتب رسالتك هنا يا بطل...">
        <button id="send-btn" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-lg font-bold transition">إرسال</button>
    </footer>

    <script>
        // --- الإعدادات (استبدل دول ببياناتك من Supabase) ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- إدارة المستخدم ---
        let username = localStorage.getItem('chat_username');
        if (!username) {
            username = prompt("أدخل اسمك المستعار (لعزوز ومحمود وحسن):") || "مستخدم_مجهول";
            localStorage.setItem('chat_username', username);
        }
        document.getElementById('user-status').innerText = `أنت: ${username}`;

        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // --- دالة لإضافة رسالة للواجهة ---
        function appendMessage(msg, prepend = false) {
            const isMyMessage = msg.username === username;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMyMessage ? 'justify-end' : 'justify-start'}`;

            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[80%] p-3 rounded-lg ${isMyMessage ? 'bg-purple-600 rounded-bl-none' : 'bg-gray-700 rounded-br-none'}`;
            
            // المنشن عند الضغط على الاسم
            innerDiv.innerHTML = `
                <span class="message-username font-bold ${isMyMessage ? 'text-purple-100' : 'text-purple-300'}" 
                      onclick="mentionUser('${msg.username}')">${msg.username}</span>
                <p class="mt-1 text-white">${msg.content}</p>
                <span class="text-xs text-purple-200 opacity-60 mt-1 block">${new Date(msg.inserted_at).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</span>
            `;

            msgDiv.appendChild(innerDiv);
            
            if (prepend) {
                chatWindow.prepend(msgDiv); // للرسائل القديمة عند التحميل
            } else {
                chatWindow.appendChild(msgDiv); // للرسائل الجديدة لحظياً
                scrollToBottom();
            }
        }

        // --- خاصية المنشن (Username,) ---
        window.mentionUser = function(userToMention) {
            if (userToMention === username) return; // متعملش منشن لنفسك
            messageInput.value = `@${userToMention}, ${messageInput.value}`;
            messageInput.focus();
        }

        // --- سكرول لأسفل الشات ---
        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // --- تحميل الرسائل القديمة (أخر 50 رسالة) ---
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('inserted_at', { ascending: false })
                .limit(50);

            if (data) {
                data.forEach(msg => appendMessage(msg, true)); // نضفهم مقلوبين عشان الترتيب الزمني
                scrollToBottom();
            }
        }

        // --- إرسال رسالة ---
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            messageInput.value = ''; // مسح الحقل فوراً للأداء

            const { error } = await supabase
                .from('messages')
                .insert([{ username, content }]);

            if (error) {
                alert('فشل إرسال الرسالة، تحقق من الإعدادات.');
                console.error(error);
            }
        }

        // --- الاستماع للرسائل الجديدة (Real-time) ---
        supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new);
            })
            .subscribe();

        // --- الأحداث (Events) ---
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // تشغيل التحميل الأولي
        loadMessages();

    </script>
</body>
</html>
