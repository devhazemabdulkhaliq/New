<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أخوات حازم - الشات الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تظبيط الطول الكامل لشاشة التابلت */
        html, body { 
            height: 100dvh; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #030712;
        }
        .message-username:hover { text-decoration: underline; cursor: pointer; color: #a855f7; }
        /* سكرول بار مخفي وشيك */
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #7e22ce; border-radius: 10px; }
    </style>
</head>
<body class="text-white font-sans flex flex-col h-full w-full">

    <header class="h-[60px] bg-purple-800 shadow-2xl flex justify-between items-center px-4 z-20 border-b border-purple-500 flex-shrink-0">
        <h1 class="text-lg font-bold tracking-tight">أخوات حازم 🚀</h1>
        <div id="user-status" class="text-[10px] bg-purple-900 px-2 py-1 rounded-full border border-purple-400 truncate max-w-[120px]"></div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-3 space-y-4 bg-gray-900 flex flex-col pb-6">
        </main>

    <footer class="p-3 bg-gray-800 border-t border-gray-700 flex gap-2 items-center flex-shrink-0 pb-[max(0.75rem,env(safe-area-inset-bottom))]">
        <input type="text" id="message-input" 
               class="flex-1 bg-gray-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-purple-500 text-sm text-white" 
               placeholder="اكتب رسالتك يا بطل...">
        <button id="send-btn" class="bg-purple-600 hover:bg-purple-700 p-3 rounded-xl font-bold transition-all active:scale-90 shadow-lg text-sm">
            إرسال
        </button>
    </footer>

    <script>
        const SUPABASE_URL = 'https://cypgyuqstiorykyrywky.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cGd5dXFzdGlvcnlreXJ5d2t5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTU5OTcsImV4cCI6MjA4OTkzMTk5N30.YOBVCDIp7R3Nh5J6_kevifbnEWxtolSnz_N3auAJvQA';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let username = localStorage.getItem('chat_username');
        if (!username) {
            username = prompt("أدخل اسمك يا بطل:") || "أخ_" + Math.floor(Math.random() * 999);
            localStorage.setItem('chat_username', username);
        }
        document.getElementById('user-status').innerText = `المستخدم: ${username}`;

        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(msg, prepend = false) {
            const isMyMessage = msg.username === username;
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMyMessage ? 'justify-end' : 'justify-start'}`;

            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[85%] p-3 rounded-2xl shadow-sm ${isMyMessage ? 'bg-purple-700 rounded-br-none' : 'bg-gray-800 rounded-bl-none border border-gray-700'}`;
            
            innerDiv.innerHTML = `
                <span class="message-username font-bold text-[10px] block mb-1 text-purple-300" 
                      onclick="mentionUser('${msg.username}')">${msg.username}</span>
                <p class="text-sm leading-snug break-words">${msg.content}</p>
                <span class="text-[9px] opacity-40 mt-1 block text-left">${new Date(msg.inserted_at).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})}</span>
            `;

            msgDiv.appendChild(innerDiv);
            if (prepend) { chatWindow.prepend(msgDiv); } 
            else { 
                chatWindow.appendChild(msgDiv); 
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }
        }

        window.mentionUser = function(user) {
            if (user === username) return;
            messageInput.value = `${user}, ${messageInput.value}`;
            messageInput.focus();
        }

        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').order('inserted_at', { ascending: false }).limit(50);
            if (data) {
                data.reverse().forEach(msg => appendMessage(msg));
            }
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;
            messageInput.value = ''; 
            await supabase.from('messages').insert([{ username, content }]);
        }

        supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => appendMessage(p.new)).subscribe();

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        loadMessages();
    </script>
</body>
</html>
