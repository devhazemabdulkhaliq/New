<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bultx Chat - Future Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        .message-username:hover { text-decoration: underline; cursor: pointer; color: #a855f7; }
        /* سكرول بار شيك */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #7e22ce; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans flex flex-col h-screen w-full">

    <header class="p-4 bg-purple-800 shadow-2xl flex justify-between items-center z-10 border-b border-purple-600">
        <h1 class="text-xl font-bold tracking-widest">BULTX ROOM 🚀</h1>
        <div id="user-status" class="text-xs bg-purple-900 px-3 py-1 rounded-full border border-purple-400"></div>
    </header>

    <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-900 flex flex-col">
        </div>

    <footer class="p-4 bg-gray-800 border-t border-gray-700 flex gap-2 items-center">
        <input type="text" id="message-input" 
               class="flex-1 bg-gray-700 rounded-xl p-4 outline-none focus:ring-2 focus:ring-purple-500 text-white placeholder-gray-400" 
               placeholder="اكتب رسالتك يا بطل...">
        <button id="send-btn" class="bg-purple-600 hover:bg-purple-700 px-8 py-4 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg">
            إرسال
        </button>
    </footer>

    <script>
        // --- الإعدادات الخاصة بك يا حازم ---
        const SUPABASE_URL = 'https://cypgyuqstiorykyrywky.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cGd5dXFzdGlvcnlreXJ5d2t5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNTU5OTcsImV4cCI6MjA4OTkzMTk5N30.YOBVCDIp7R3Nh5J6_kevifbnEWxtolSnz_N3auAJvQA';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- إدارة اسم المستخدم ---
        let username = localStorage.getItem('chat_username');
        if (!username) {
            username = prompt("أدخل اسمك المستعار للدخول للشات:") || "مستخدم_" + Math.floor(Math.random() * 1000);
            localStorage.setItem('chat_username', username);
        }
        document.getElementById('user-status').innerText = `المستخدم: ${username}`;

        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // --- دالة عرض الرسائل مع ميزة المنشن ---
        function appendMessage(msg, prepend = false) {
            const isMyMessage = msg.username === username;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMyMessage ? 'justify-end' : 'justify-start'} animate-fade-in`;

            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[85%] p-4 rounded-2xl shadow-md ${isMyMessage ? 'bg-purple-700 rounded-br-none' : 'bg-gray-800 rounded-bl-none border border-gray-700'}`;
            
            innerDiv.innerHTML = `
                <span class="message-username font-black text-xs block mb-1 uppercase tracking-tighter" 
                      onclick="mentionUser('${msg.username}')">${msg.username}</span>
                <p class="text-sm md:text-base leading-relaxed break-words">${msg.content}</p>
                <span class="text-[10px] opacity-40 mt-2 block text-left">${new Date(msg.inserted_at).toLocaleTimeString('ar-EG')}</span>
            `;

            msgDiv.appendChild(innerDiv);
            
            if (prepend) {
                chatWindow.prepend(msgDiv);
            } else {
                chatWindow.appendChild(msgDiv);
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }
        }

        // --- ميزة المنشن (اسم، ) ---
        window.mentionUser = function(user) {
            if (user === username) return;
            messageInput.value = `${user}, ${messageInput.value}`;
            messageInput.focus();
        }

        // --- تحميل أرشيف الشات ---
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('inserted_at', { ascending: false })
                .limit(100);

            if (data) {
                data.forEach(msg => appendMessage(msg, true));
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        // --- إرسال الرسالة للسيرفر ---
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            messageInput.value = ''; 

            const { error } = await supabase
                .from('messages')
                .insert([{ username, content }]);

            if (error) console.error("Error sending:", error);
        }

        // --- استقبال الرسائل لحظياً (Real-time) ---
        supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new);
            })
            .subscribe();

        // --- اختصارات الكيبورد ---
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        loadMessages();
    </script>
</body>
</html>
